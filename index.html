<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atheaton.media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #FDFBF7;
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    color: #2B2B2B;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    max-width: 280px;
    width: 100%;
    height: auto;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.1s forwards;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, transparent, #B2A082, transparent);
    margin: 0 auto 2rem;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.5s forwards;
  }

  .soon {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: #8A8A8A;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.7s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div>
  <img src="logo.png" alt="atheaton.media" class="logo">
  <div class="divider"></div>
  <p class="soon">Coming soon</p>
</div>
</body>
</html>
